name: API CI/CD

on:
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - ".github/workflows/azure-api.yml"
  pull_request:
    branches:
      - main
    paths:
      - "apps/api/**"
      - ".github/workflows/azure-api.yml"
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: bffc-api
  AZURE_WEBAPP_RESOURCE_GROUP: bffc-api-group
  ACR_NAME: apiimage
  ACR_RESOURCE_GROUP: bffc-api_group
  IMAGE_NAME: bffc-api

defaults:
  run:
    working-directory: apps/api

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build API
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Verify container image builds
        run: docker build --target final -t "${{ env.IMAGE_NAME }}:ci" .

  deploy:
    runs-on: ubuntu-latest
    name: Build image and deploy
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and push image to ACR
        run: |
          az acr build \
            --registry "${{ env.ACR_NAME }}" \
            --resource-group "${{ env.ACR_RESOURCE_GROUP }}" \
            --image "${{ env.IMAGE_NAME }}:latest" \
            --image "${{ env.IMAGE_NAME }}:${{ github.sha }}" \
            --file Dockerfile \
            --target final \
            .

      - name: Restart App Service
        run: |
          az webapp restart \
            --resource-group "${{ env.AZURE_WEBAPP_RESOURCE_GROUP }}" \
            --name "${{ env.AZURE_WEBAPP_NAME }}"
