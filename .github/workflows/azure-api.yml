name: Deploy API to Azure App Service

on:
  push:
    branches:
      - main
    paths:
      - "apps/api/**"
      - ".github/workflows/azure-api.yml"
  workflow_dispatch:

concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build API
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore apps/api/api.csproj

      - name: Publish
        run: dotnet publish apps/api/api.csproj -c Release -o ./publish

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-publish
          path: ./publish
          retention-days: 1

  deploy:
    name: Deploy to Azure
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: api-publish
          path: ./publish

      - name: Check deploy configuration
        id: deploy
        env:
          APP_NAME: ${{ secrets.AZURE_API_APP_NAME }}
          PUBLISH_PROFILE: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
        run: |
          if [ -n "$APP_NAME" ] && [ -n "$PUBLISH_PROFILE" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Deploy skipped. Add AZURE_API_APP_NAME and AZURE_API_PUBLISH_PROFILE secrets to enable API deployment."
            echo "See docs/github-actions.md for setup instructions."
          fi

      - name: Deploy to Azure Web App
        if: steps.deploy.outputs.enabled == 'true'
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ secrets.AZURE_API_APP_NAME }}
          publish-profile: ${{ secrets.AZURE_API_PUBLISH_PROFILE }}
          package: ./publish
