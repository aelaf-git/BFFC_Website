services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: bffc
      POSTGRES_USER: bffc
      POSTGRES_PASSWORD: devpassword
    ports:
      - "5433:5432"
    volumes:
      - bffc_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bffc -d bffc"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    ports:
      - "5000:8080"
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ALLOWED_ORIGINS=http://localhost:3000
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=bffc;Username=bffc;Password=devpassword;SSL Mode=Prefer
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    develop:
      watch:
        - action: sync
          path: .
          target: /src
          ignore:
            - bin/
            - obj/
        - action: rebuild
          path: api.csproj

volumes:
  bffc_pgdata:
