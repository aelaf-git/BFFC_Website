services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      # Mount source so edits on your machine show up in the container immediately
      - .:/app
      # Keep container node_modules (don't overwrite with empty host folder)
      - /app/node_modules
      # Keep Next.js cache inside the container
      - /app/.next
    develop:
      watch:
        - path: ./package.json
          action: rebuild
        - path: ./package-lock.json
          action: rebuild
        - path: ./next.config.ts
          action: rebuild
    environment:
      - WATCHPACK_POLLING=true
